<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>江西小炒制作工艺 - 味派食品科技</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #E54D2E;
      --primary-dark: #C73E22;
      --secondary: #FFF8F5;
      --warm-bg: #FEF6F3;
      --gold: #F5A623;
      --text-dark: #222222;
      --text-medium: #444444;
      --text-light: #888888;
      --border: #EEEEEE;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--secondary);
      color: var(--text-dark);
      min-height: 100vh;
    }
    html, body {
      overscroll-behavior-y: none;
    }
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: #fff;
      box-shadow: 0 2px 20px var(--shadow);
      z-index: 10002;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-dark);
    }
    .navbar-brand .logo {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 18px;
    }
    .navbar-brand .company {
      font-size: 14px;
      color: var(--text-light);
    }
    .navbar-actions span {
      font-size: 13px;
      color: var(--text-light);
    }
    .main-page { padding-top: 84px; min-height: 100vh; }
    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, #FA6400 100%);
      padding: 60px 40px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; right: -10%;
      width: 500px; height: 500px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }
    .hero h1 { font-size: 42px; font-weight: 700; margin-bottom: 12px; }
    .hero p { font-size: 16px; opacity: 0.9; max-width: 500px; }
    .hero .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      margin-top: 20px;
    }
    .cards-section { padding: 50px 40px; }
    .section-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title::before {
      content: '';
      width: 4px; height: 24px;
      background: var(--primary);
      border-radius: 2px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .dish-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px var(--shadow);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    .dish-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .dish-card-image {
      height: 200px;
      background: linear-gradient(135deg, var(--warm-bg) 0%, #ffe5dc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .dish-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .dish-card-image .placeholder-icon {
      font-size: 64px;
      opacity: 0.5;
    }
    .dish-card-image .dish-name-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 30px 20px 15px;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      color: #fff;
    }
    .dish-card-image .dish-name-overlay h3 { font-size: 22px; font-weight: 600; }
    .dish-card-image .dish-name-overlay span { font-size: 12px; opacity: 0.8; }
    .dish-card-content { padding: 20px; }
    .dish-card-meta {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
    }
    .dish-card-meta .tag {
      background: var(--warm-bg);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
    }
    .dish-card-meta .steps-count {
      font-size: 12px;
      color: var(--text-light);
    }
    .dish-card-ingredients {
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .dish-card-arrow {
      position: absolute;
      bottom: 20px; right: 20px;
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      transition: transform 0.3s ease;
      cursor: pointer;
      z-index: 10;
    }
    .dish-card:hover .dish-card-arrow { transform: translateX(4px); }
    .dish-card-content { position: relative; }
    .detail-page { display: none; padding-top: 64px; min-height: 100vh; }
    .detail-page.active { display: block; }
    .main-page.hidden { display: none; }
    .detail-header {
      height: 320px;
      background: linear-gradient(135deg, var(--primary) 0%, #FA6400 100%);
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 40px;
      color: #fff;
    }
    .detail-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="rgba(255,255,255,0.05)"/></svg>');
      background-size: 200px;
    }
    .detail-header-content { position: relative; z-index: 1; }
    .back-btn {
      position: absolute;
      top: 20px; left: 20px;
      width: 44px; height: 44px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.3s;
      border: none;
      z-index: 100001;
    }
    .back-btn:hover { background: rgba(0,0,0,0.7); }
    .detail-header h1 { font-size: 48px; font-weight: 700; margin-bottom: 8px; }
    .detail-header .subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 20px; }
    .detail-header .meta { display: flex; gap: 20px; }
    .detail-header .meta-item {
      background: rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
    }
    .detail-content { padding: 40px; max-width: 900px; margin: 0 auto; }
    .ingredients-card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 4px 20px var(--shadow);
    }
    .ingredients-card h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ingredients-card h2 .icon { font-size: 24px; }
    .ingredients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .ingredient-item {
      background: var(--warm-bg);
      padding: 12px 16px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ingredient-item .name { font-size: 14px; color: var(--text-dark); }
    .ingredient-item .qty { font-size: 13px; color: var(--primary); font-weight: 500; }
    .steps-card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px var(--shadow);
    }
    .steps-card h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .steps-card h2 .icon { font-size: 24px; }
    .step-item {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .step-item:last-child { border-bottom: none; }
    .step-item::before {
      content: '';
      position: absolute;
      left: 23px;
      top: 60px;
      bottom: -20px;
      width: 2px;
      background: var(--border);
    }
    .step-item:last-child::before { display: none; }
    .step-number {
      width: 48px; height: 48px;
      min-width: 48px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }
    .step-content { flex: 1; padding-top: 4px; }
    .step-content h4 { font-size: 16px; font-weight: 500; color: var(--text-dark); margin-bottom: 8px; }
    .step-content p { font-size: 14px; color: var(--text-medium); line-height: 1.8; }
    .footer {
      background: var(--text-dark);
      color: #fff;
      padding: 30px 40px;
      text-align: center;
    }
    .footer p { font-size: 13px; opacity: 0.7; }
    .footer .company { font-size: 15px; opacity: 1; margin-bottom: 5px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .dish-card { animation: fadeIn 0.5s ease forwards; }
    .cards-grid .dish-card:nth-child(1) { animation-delay: 0.1s; }
    .cards-grid .dish-card:nth-child(2) { animation-delay: 0.15s; }
    .cards-grid .dish-card:nth-child(3) { animation-delay: 0.2s; }
    .cards-grid .dish-card:nth-child(4) { animation-delay: 0.25s; }
    .cards-grid .dish-card:nth-child(5) { animation-delay: 0.3s; }
    .cards-grid .dish-card:nth-child(6) { animation-delay: 0.35s; }
    .cards-grid .dish-card:nth-child(7) { animation-delay: 0.4s; }
    .cards-grid .dish-card:nth-child(8) { animation-delay: 0.45s; }
    .cards-grid .dish-card:nth-child(9) { animation-delay: 0.5s; }
    .cards-grid .dish-card:nth-child(10) { animation-delay: 0.55s; }
    .cards-grid .dish-card:nth-child(11) { animation-delay: 0.6s; }
    .cards-grid .dish-card:nth-child(12) { animation-delay: 0.65s; }
    .cards-grid .dish-card:nth-child(13) { animation-delay: 0.7s; }
    .cards-grid .dish-card:nth-child(14) { animation-delay: 0.75s; }
    @media (max-width: 768px) {
      .navbar { padding: 0 20px; }
      .hero { padding: 40px 20px; }
      .hero h1 { font-size: 28px; }
      .cards-section { padding: 30px 20px; }
      .detail-header { height: 280px; padding: 30px 20px; }
      .detail-header h1 { font-size: 32px; }
      .detail-content { padding: 20px; }
      .ingredients-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <nav class="navbar">

  <footer class="footer">

  const dishesData = [
    {"id":"三杯鸡","name":"三杯鸡","ingredients":[{"name":"三黄鸡","qty":"560","unit":"g"},{"name":"生姜（拍姜）","qty":"30","unit":"g"},{"name":"蒜子","qty":"50","unit":"g"},{"name":"猪油","qty":"50","unit":"g"},{"name":"糯米酒","qty":"50","unit":"g"},{"name":"小炒汁（辣）","qty":"47","unit":"g"},{"name":"香菇","qty":"20","unit":"g"},{"name":"青椒","qty":"5","unit":"g"},{"name":"红椒","qty":"5","unit":"g"},{"name":"小葱","qty":"5","unit":"g"}],"steps":[{"num":1,"text":"提前准备好食材，三黄鸡切块，青红椒切菱形片"},{"num":2,"text":"下入猪油烧香后下入拍姜，蒜子炒香，下入小葱"},{"num":3,"text":"下入鸡子煸炒一下后给入酱汁，糯米酒，香菇"},{"num":4,"text":"盖上闷8分钟，4分钟时候开盖翻两下防止糊边"},{"num":5,"text":"起锅时候前下入青红椒片"}]},

    {"id":"肉炒肉","name":"肉炒肉","ingredients":[{"name":"肥肉","qty":"100","unit":"g"},{"name":"前夹肉","qty":"200","unit":"g"},{"name":"小米辣","qty":"70","unit":"g"},{"name":"美人椒","qty":"100","unit":"g"},{"name":"生姜沫","qty":"15","unit":"g"},{"name":"蒜沫","qty":"30","unit":"g"},{"name":"印度辣椒面","qty":"15","unit":"g"},{"name":"豆豉","qty":"5","unit":"g"},{"name":"芹菜","qty":"50","unit":"g"},{"name":"水","qty":"120","unit":"g"},{"name":"江西小炒汁","qty":"55","unit":"g"},{"name":"大豆油","qty":"适量","unit":"g"}],"steps":[{"num":1,"text":"热锅冷油下入肥肉炒香，炒干油脂"},{"num":2,"text":"加入生姜蒜末小米辣炒香后加入豆豉，锅里加入水"},{"num":3,"text":"水开后给小炒汁，下入前夹肉烹煮30秒后依次加入美人椒，芹菜后大火收汁起锅即可"}]},
    {"id":"青椒炒肉","name":"青椒炒肉","ingredients":[{"name":"青椒","qty":"250","unit":"g"},{"name":"五花肉片","qty":"200","unit":"g"},{"name":"小米辣","qty":"20","unit":"g"},{"name":"豆豉","qty":"3","unit":"g"},{"name":"姜沫","qty":"10","unit":"g"},{"name":"蒜沫","qty":"10","unit":"g"},{"name":"水","qty":"40","unit":"g"},{"name":"小炒汁","qty":"35","unit":"g"},{"name":"油","qty":"适量","unit":"g"}],"steps":[{"num":1,"text":"提前准备好食材，青椒切滚刀"},{"num":2,"text":"锅中水分烧干下入青椒，干炕至断生捞出备用"},{"num":3,"text":"热锅冷油下入五花肉片煸炒干香后下入小米辣，生姜蒜沫炒香"},{"num":4,"text":"下入青椒给上小炒汁后翻炒均匀起锅即可"}]},
    {"id":"香辣猪脚","name":"香辣猪脚","ingredients":[{"name":"猪脚","qty":"1000","unit":"g"},{"name":"大蒜叶","qty":"20","unit":"g"},{"name":"烧菜酱","qty":"60","unit":"g"},{"name":"小炒汁","qty":"60","unit":"g"},{"name":"猪脚原汤","qty":"200","unit":"g"},{"name":"蒜粒","qty":"10","unit":"g"},{"name":"姜粒","qty":"10","unit":"g"},{"name":"美人椒","qty":"50","unit":"g"},{"name":"二荆条辣椒皮","qty":"10","unit":"g"},{"name":"大豆油","qty":"适量","unit":"g"}],"steps":[{"num":1,"text":"猪脚加工给烧菜酱（香料：草果：5，白芷：3，丁香：3，八角；10，桂皮：10，辣椒王：5）"},{"num":2,"text":"准备好食材，保留猪脚原汤"},{"num":3,"text":"下入猪脚原汤和猪脚，给蒜粒，姜粒给入小炒汁开大火收汁"},{"num":4,"text":"下入红杭椒，二荆条，汤汁浓稠后给大蒜叶起锅即可"}]},
    {"id":"香辣鱿鱼须","name":"香辣鱿鱼须","ingredients":[{"name":"鱿鱼须","qty":"170","unit":"g"},{"name":"韭菜","qty":"30","unit":"g"},{"name":"小米辣","qty":"80","unit":"g"},{"name":"姜沫","qty":"10","unit":"g"},{"name":"蒜沫","qty":"10","unit":"g"},{"name":"红杭椒","qty":"80","unit":"g"},{"name":"孜然粒","qty":"4","unit":"g"},{"name":"小炒汁","qty":"20","unit":"g"},{"name":"烧菜酱","qty":"20","unit":"g"},{"name":"大豆油","qty":"适量","unit":"g"}],"steps":[{"num":1,"text":"提前准备好食材，鱿鱼须切条状大小均匀一些"},{"num":2,"text":"冷水下锅鱿鱼须去腥，水开后捞出"},{"num":3,"text":"锅中给油，下入小米辣，姜沫，蒜沫，孜然粒炒香"},{"num":4,"text":"下入鱿鱼须红杭椒炒熟，然后下入小炒汁翻炒一下起锅即可"}]}
  ];

    function showMainPage() {
      document.getElementById('mainPage').style.display = 'block';
      document.getElementById('detailPage').style.display = 'none';
      updateTouchBlocker();
      window.scrollTo(0, 0);
    }

    function showDetail(dishId) {
      const dish = dishesData.find(d => d.id === dishId);
      if (!dish) return;

      document.getElementById('detailTitle').textContent = dish.name;
      document.getElementById('detailSubtitle').textContent = '标准化制作工艺';
      document.getElementById('detailStepsCount').textContent = `共 ${dish.steps.length} 步`;
      document.getElementById('detailIngredientsCount').textContent = `${dish.ingredients.length} 种食材`;

      const detailHeader = document.querySelector('.detail-header');
      const imgUrl = dishImages[dish.id];
      if (imgUrl) {
        detailHeader.style.backgroundImage = `url(${imgUrl})`;
        detailHeader.style.backgroundSize = 'cover';
        detailHeader.style.backgroundPosition = 'center';
        detailHeader.style.backgroundColor = 'rgba(0,0,0,0.4)';
      } else {
        detailHeader.style.backgroundImage = '';
        detailHeader.style.backgroundColor = '';
      }

      const ingredientsGrid = document.getElementById('ingredientsGrid');
      ingredientsGrid.innerHTML = dish.ingredients.map(ing => `
        <div class="ingredient-item">
          <span class="name">${ing.name}</span>
          <span class="qty">${ing.qty}${ing.unit}</span>
        </div>
      `).join('');

      const stepsList = document.getElementById('stepsList');
      stepsList.innerHTML = dish.steps.map(step => `
        <div class="step-item">
          <div class="step-number">${step.num}</div>
          <div class="step-content">
            <h4>第 ${step.num} 步</h4>
            <p>${step.text}</p>
          </div>
        </div>
      `).join('');

      document.getElementById('mainPage').style.display = 'none';
      document.getElementById('detailPage').style.display = 'block';
      updateTouchBlocker();
      window.scrollTo(0, 0);
    }

    function renderCards() {
      const cardsGrid = document.getElementById('cardsGrid');
      cardsGrid.innerHTML = dishesData.map(dish => {
        const ingredientNames = dish.ingredients.slice(0, 4).map(i => i.name).join('、');
        const imgUrl = dishImages[dish.id] || '';
        return `
          <div class="dish-card" data-id="${dish.id}">
            <div class="dish-card-image">
              ${imgUrl ? `<img src="${imgUrl}" alt="${dish.name}" loading="lazy">` : `<span class="placeholder-icon">🍳</span>`}
              <div class="dish-name-overlay">
                <h3>${dish.name}</h3>
                <span>点击查看制作工艺</span>
              </div>
            </div>
            <div class="dish-card-content">
              <div class="dish-card-meta">
                <span class="tag">${dish.steps.length} 步</span>
                <span class="steps-count">${dish.ingredients.length} 种食材</span>
              </div>
              <p class="dish-card-ingredients">${ingredientNames}...</p>
            </div>
            <div class="dish-card-arrow">→</div>
          </div>
        `;
      }).join('');
    }

    renderCards();

    // 返回按钮点击事件
    document.getElementById('backBtn').addEventListener('click', function() {
      showMainPage();
    });

    // 点击卡片进入详情页（事件委托）
    document.getElementById('cardsGrid').addEventListener('click', function(e) {
      const card = e.target.closest('.dish-card');
      if (card) {
        const dishId = card.getAttribute('data-id');
        showDetail(dishId);
      }
    });

    // 手机端滑动返回上一页
    let touchStartX = 0;
    let touchEndX = 0;
    let isSwiping = false;
    const detailPage = document.getElementById('detailPage');

    // 检查是否在详情页
    function isDetailPageActive() {
      return detailPage.style.display === 'block';
    }

    // 阻止浏览器默认左滑返回
    window.history.pushState(null, '', location.href);

    window.addEventListener('popstate', function(e) {
      if (isDetailPageActive()) {
        window.history.pushState(null, '', location.href);
        showMainPage();
      } else {
        window.history.pushState(null, '', location.href);
      }
    });

    document.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].screenX;
      isSwiping = true;
    }, {passive: true});

    document.addEventListener('touchmove', function(e) {
      if (!isSwiping) return;
      if (isDetailPageActive() || e.target.closest('.detail-page')) {
        const moveX = e.touches[0].screenX;
        // 从屏幕最左边开始右滑时阻止默认行为
        if (touchStartX <= 10 && moveX > touchStartX) {
          e.preventDefault();
        }
      }
    }, {passive: false});

    document.addEventListener('touchend', function(e) {
      if (!isSwiping) return;
      isSwiping = false;
      touchEndX = e.changedTouches[0].screenX;
      // 从屏幕最左边（<=10px）开始右滑超过80px
      if (touchStartX <= 10 && touchEndX - touchStartX > 80) {
        if (isDetailPageActive()) {
          // 详情页右滑返回首页
          showMainPage();
        } else {
          // 首页右滑返回上一级（浏览器返回）
          history.back();
        }
      }
    }, {passive: true});

    // 详情页时激活遮罩层阻止左滑返回
    function updateTouchBlocker() {
      const blocker = document.getElementById('touchBlocker');
      if (isDetailPageActive()) {
        blocker.style.display = 'block';
      } else {
        blocker.style.display = 'none';
      }
    }
    updateTouchBlocker();

    // 确保首页卡片显示
    renderCards();
  </script>
</html>
